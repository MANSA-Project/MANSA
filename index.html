<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="منصة تعليمية تفاعلية لطلاب الجامعات" />
    <meta name="theme-color" content="#667eea" />

    <title>MANSA — منصة تعليمية</title>

    <!--
      Phase 10: link CSS files here once created
      <link rel="stylesheet" href="/assets/css/main.css" />

      Phase 14: add PWA tags here (manifest.json, apple-touch-icon, etc.)
      <link rel="manifest" href="/manifest.webmanifest" />
    -->
  </head>

  <body>
    <!--
      SPA mount point.
      All views are rendered into this div by the router (Phase 9+).
      Nothing should be hardcoded here as permanent content.
    -->
    <div id="app">
      <!--
        This loading state is visible for the ~100ms before main.js executes.
        Phase 9: main.js will clear this and render the first route.
        Phase 10: replace inline style with the real CSS loading class.
      -->
      <div
        id="initial-loader"
        style="
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          font-family: system-ui, sans-serif;
          font-size: 1.2rem;
          color: #667eea;
        "
      >
        MANSA
      </div>
    </div>

    <noscript>
      <p style="text-align: center; padding: 2rem; font-family: sans-serif">
        يتطلب هذا التطبيق تفعيل JavaScript.<br />
        This app requires JavaScript to be enabled.
      </p>
    </noscript>

    <!--
      Phase 9: uncomment this once src/js/main.js exists.
      Vite serves src/ directly — /src/js/main.js is a clean, standard path.
      <script type="module" src="/src/js/main.js"></script>
    -->
  </body>
</html>
